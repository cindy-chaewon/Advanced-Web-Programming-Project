[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# pytest-asyncio strict mode 비활성화 — 우리는 sync FastAPI TestClient 사용.
asyncio_mode = auto
addopts = -ra --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning
    ignore::PendingDeprecationWarning
